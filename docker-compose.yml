services:
  agentos-db:
    image: agnohq/pgvector:18
    container_name: agentos-db
    restart: unless-stopped
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - agentos

  agentos-api:
    build:
      context: ./agent-platform
      dockerfile: Dockerfile
    container_name: agentos-api
    image: ${IMAGE_NAME:-agentos}:${IMAGE_TAG:-latest}
    command: >
      uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
      --reload-dir agents --reload-dir app --reload-dir db
    restart: unless-stopped
    ports:
      - "8000:8000"
    volumes:
      - ./agent-platform:/app
      - ./platform/agno/libs/agno/agno:/usr/local/lib/python3.12/site-packages/agno
    env_file:
      - path: ./agent-platform/.env
        required: false
      - path: ./.env
        required: false
    environment:
      RUNTIME_ENV: dev
      AGNO_DEBUG: "True"
      WAIT_FOR_DB: "True"
      AGNO_MEMORY_MODEL: openai:gpt-5.4
      AGENTOS_URL: http://127.0.0.1:8000
      DB_HOST: agentos-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
    depends_on:
      - agentos-db
    networks:
      - agentos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    environment:
      NEXT_PUBLIC_AGNO_AGENTOS_BASE_URL: /api/agno
      INTERNAL_AGNO_AGENTOS_BASE_URL: http://agentos-api:8000
      NEXT_PUBLIC_USER_ID: local_user
      NEXT_PUBLIC_AGNO_MEMORY_OPTIMIZE_MODEL: openai:gpt-5.4
    ports:
      - "3000:3000"
    volumes:
      - ./frontend:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      agentos-api:
        condition: service_healthy
    networks:
      - agentos

networks:
  agentos:

volumes:
  pgdata:
