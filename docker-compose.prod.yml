services:
  agentos-db:
    image: agnohq/pgvector:18
    container_name: agentos-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - pgdata:/var/lib/postgresql
    environment:
      POSTGRES_USER: ${DB_USER:-ai}
      POSTGRES_PASSWORD: ${DB_PASS:-ai}
      POSTGRES_DB: ${DB_DATABASE:-ai}
    networks:
      - agentos

  agentos-api:
    build:
      context: .
      dockerfile: Dockerfile.agentos.prod
    container_name: agentos-api
    image: ${IMAGE_NAME:-agentos}:${IMAGE_TAG:-prod}
    restart: unless-stopped
    ports:
      - "${AGENTOS_PORT:-8000}:8000"
    env_file:
      - path: ./.env
        required: false
    environment:
      RUNTIME_ENV: ${RUNTIME_ENV:-dev}
      AGNO_DEBUG: ${AGNO_DEBUG:-False}
      WAIT_FOR_DB: "True"
      AGNO_MEMORY_MODEL: ${AGNO_MEMORY_MODEL:-openai:gpt-5.4}
      AGENTOS_URL: ${AGENTOS_URL:-http://127.0.0.1:8000}
      DB_HOST: agentos-db
      DB_PORT: 5432
      DB_USER: ${DB_USER:-ai}
      DB_PASS: ${DB_PASS:-ai}
      DB_DATABASE: ${DB_DATABASE:-ai}
    depends_on:
      - agentos-db
    networks:
      - agentos
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://localhost:8000/health"]
      interval: 10s
      timeout: 5s
      retries: 20

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend.prod
    container_name: primeagent-frontend
    restart: unless-stopped
    environment:
      INTERNAL_AGNO_AGENTOS_BASE_URL: http://agentos-api:8000
      NEXT_PUBLIC_USER_ID: ${NEXT_PUBLIC_USER_ID:-local_user}
      NEXT_PUBLIC_AGNO_MEMORY_OPTIMIZE_MODEL: ${NEXT_PUBLIC_AGNO_MEMORY_OPTIMIZE_MODEL:-openai:gpt-5.4}
    ports:
      - "${FRONTEND_PORT:-3000}:3000"
    depends_on:
      agentos-api:
        condition: service_healthy
    networks:
      - agentos

networks:
  agentos:

volumes:
  pgdata:
